<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Invenio app icon">
  <defs>
    <linearGradient id="appIcon" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0369A1"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
  </defs>
  <!-- iOS renders the full square; iOS applies its own rounding.
       For Android maskable, treat the inner 66% (342px padding) as the safe zone. -->
  <rect width="1024" height="1024" fill="url(#appIcon)"/>
  <!-- I letterform, centered, scaled to fit within iOS-safe area (~67%) -->
  <path d="M336 272h352v112h-120v256h120v112H336V640h120V384H336z" fill="#FFFFFF"/>
</svg>
