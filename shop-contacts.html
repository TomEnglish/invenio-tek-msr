<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png" />
    <link rel="apple-touch-icon" href="brand/app-icon.svg" />
    <meta name="theme-color" content="#0369a1" />

    <!-- Theme init: avoid FOUC by setting data-theme before paint -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('invenio-theme');
          if (saved === 'dark' || saved === 'light') {
            document.documentElement.setAttribute('data-theme', saved);
          }
        } catch (e) { /* localStorage blocked — fall through to OS preference */ }
      })();
    </script>
    <link rel="manifest" href="site.webmanifest" />
    <title>Shop Contacts</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Shared Design System -->
    <link rel="stylesheet" href="styles.css?v=20260424b">

    <!-- Hide until auth ready -->
    <style>
        html:not(.auth-ready) body { visibility: hidden; }

        /* ── Shop Contacts Page ────────────────────────────────── */
        .contacts-header {
            margin-bottom: 24px;
        }
        .contacts-header h1 {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 4px;
        }
        .contacts-header p {
            color: var(--text-muted);
            font-size: 13px;
            margin: 0;
        }

        .search-bar {
            position: relative;
            max-width: 480px;
            margin-bottom: 24px;
        }
        .search-bar i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 14px;
        }
        .search-bar input {
            width: 100%;
            padding: 10px 14px 10px 40px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            background: var(--surface);
            color: var(--text-primary);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        .search-bar input::placeholder {
            color: var(--text-light);
        }
        .search-bar input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(3, 105, 161, 0.1);
        }

        .contacts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        @media (max-width: 1200px) {
            .contacts-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .contacts-grid { grid-template-columns: 1fr; }
        }

        .contact-card {
            border-radius: 14px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .contact-card .shop-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .contact-card .shop-name i {
            color: var(--primary);
            font-size: 14px;
        }
        .contact-card .shop-address {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            margin: 0;
        }
        .contact-card .contact-person {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-primary);
        }
        .contact-card .contact-person i {
            color: var(--text-light);
            width: 14px;
            text-align: center;
        }
        .contact-card .contact-person .contact-label {
            color: var(--text-light);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .contact-card .contact-phone {
            color: var(--text-muted);
            margin-left: 4px;
        }
        .contact-card .shop-notes {
            font-size: 12px;
            color: var(--text-light);
            margin: 0;
            padding-top: 8px;
            border-top: 1px solid var(--border-light);
            font-style: italic;
        }

        .contacts-count {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 16px;
        }

        .contacts-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }
        .contacts-empty i {
            font-size: 32px;
            color: var(--text-light);
            margin-bottom: 12px;
            display: block;
        }

        .contacts-loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 20px;
        }
    </style>
</head>

<body>
    <div class="contacts-header fade-up">
        <h1><i class="fas fa-address-book" style="margin-right:8px; font-size:20px; color:var(--primary);"></i>Shop Contacts</h1>
        <p>Vendor and shop location directory with contact information</p>
    </div>

    <div class="search-bar fade-up" style="animation-delay:0.05s;">
        <i class="fas fa-search"></i>
        <input type="text" id="contactSearch" placeholder="Search by name, address, or contact...">
    </div>

    <div id="contactsCount" class="contacts-count fade-up" style="animation-delay:0.08s;"></div>

    <div class="contacts-grid fade-up" id="contactsGrid" style="animation-delay:0.1s;">
        <div class="contacts-loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 mb-0" style="color:var(--text-muted);">Loading shop contacts...</p>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <!-- Shared Utilities -->
    <script src="js/utils/supabase-client.js"></script>
    <script src="js/utils/auth-guard.js"></script>
    <script src="js/utils/branding.js"></script>
    <script src="js/utils/sidebar.js"></script>

    <script>
        let allContacts = [];

        async function loadContacts() {
            const grid = document.getElementById('contactsGrid');
            const countEl = document.getElementById('contactsCount');

            try {
                const { data, error } = await supabaseClient
                    .from('shop_contacts')
                    .select('*')
                    .order('shop_name', { ascending: true });

                if (error) throw error;

                allContacts = data || [];
                renderContacts(allContacts);
            } catch (err) {
                console.error('Failed to load shop contacts:', err);
                grid.innerHTML = `
                    <div class="contacts-empty">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Failed to load contacts. Please try again later.</p>
                    </div>`;
                countEl.textContent = '';
            }
        }

        function renderContacts(contacts) {
            const grid = document.getElementById('contactsGrid');
            const countEl = document.getElementById('contactsCount');

            if (!contacts.length) {
                grid.innerHTML = `
                    <div class="contacts-empty">
                        <i class="fas fa-search"></i>
                        <p>No contacts found.</p>
                    </div>`;
                countEl.textContent = '0 contacts';
                return;
            }

            countEl.textContent = `${contacts.length} contact${contacts.length !== 1 ? 's' : ''}`;

            grid.innerHTML = contacts.map(c => {
                const address = [c.address, c.city, c.state, c.zip]
                    .filter(Boolean)
                    .join(', ');

                let contactsHtml = '';

                if (c.primary_contact_name || c.primary_contact_phone) {
                    contactsHtml += `
                        <div class="contact-person">
                            <i class="fas fa-user"></i>
                            <span>${escapeHtml(c.primary_contact_name || '—')}</span>
                            ${c.primary_contact_phone
                                ? `<span class="contact-phone"><i class="fas fa-phone" style="font-size:11px;"></i> ${escapeHtml(c.primary_contact_phone)}</span>`
                                : ''}
                        </div>`;
                }

                if (c.secondary_contact_name || c.secondary_contact_phone) {
                    contactsHtml += `
                        <div class="contact-person">
                            <i class="fas fa-user-plus"></i>
                            <span>${escapeHtml(c.secondary_contact_name || '—')}</span>
                            ${c.secondary_contact_phone
                                ? `<span class="contact-phone"><i class="fas fa-phone" style="font-size:11px;"></i> ${escapeHtml(c.secondary_contact_phone)}</span>`
                                : ''}
                        </div>`;
                }

                const notesHtml = c.notes
                    ? `<p class="shop-notes"><i class="fas fa-sticky-note" style="margin-right:4px;"></i>${escapeHtml(c.notes)}</p>`
                    : '';

                return `
                    <div class="card contact-card">
                        <h3 class="shop-name"><i class="fas fa-store"></i>${escapeHtml(c.shop_name || 'Unnamed Shop')}</h3>
                        ${address ? `<p class="shop-address"><i class="fas fa-map-marker-alt" style="margin-right:4px;"></i>${escapeHtml(address)}</p>` : ''}
                        ${contactsHtml}
                        ${notesHtml}
                    </div>`;
            }).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Search filter
        document.getElementById('contactSearch').addEventListener('input', function () {
            const query = this.value.toLowerCase().trim();
            if (!query) {
                renderContacts(allContacts);
                return;
            }
            const filtered = allContacts.filter(c => {
                const searchable = [
                    c.shop_name,
                    c.address,
                    c.city,
                    c.state,
                    c.zip,
                    c.primary_contact_name,
                    c.primary_contact_phone,
                    c.secondary_contact_name,
                    c.secondary_contact_phone,
                    c.notes
                ].filter(Boolean).join(' ').toLowerCase();
                return searchable.includes(query);
            });
            renderContacts(filtered);
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', loadContacts);
    </script>
</body>

</html>
