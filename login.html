<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="brand/app-icon.svg" />
    <meta name="theme-color" content="#0369a1" />

    <!-- Theme init: avoid FOUC by setting data-theme before paint -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('invenio-theme');
          if (saved === 'dark' || saved === 'light') {
            document.documentElement.setAttribute('data-theme', saved);
          }
        } catch (e) { /* localStorage blocked — fall through to OS preference */ }
      })();
    </script>
    <title>Login - MSR Dashboard</title>

    <!-- Shared Design System -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Login-only layout — uses shared tokens from styles.css.
           styles.css forces overflow:hidden on body for the app shell;
           the login page doesn't render that shell, so we restore the
           normal page flow here. */
        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Left branding panel — Invenio gradient + mark */
        .login-brand {
            width: 45%;
            background: var(--hero-gradient);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            position: relative;
            overflow: hidden;
        }
        .login-brand::before,
        .login-brand::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
        }
        .login-brand::before {
            width: 400px; height: 400px;
            top: -100px; right: -100px;
        }
        .login-brand::after {
            width: 300px; height: 300px;
            background: rgba(255, 255, 255, 0.04);
            bottom: -80px; left: -80px;
        }
        .login-brand .logo-container {
            text-align: center;
            z-index: 1;
        }
        .login-brand .mark-svg {
            width: 96px;
            height: 96px;
            margin: 0 auto 2rem;
            display: block;
            color: #fff;
        }
        .login-brand .mark-svg path { fill: currentColor; }
        .login-brand h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        .login-brand .tagline {
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Right form panel */
        .login-form-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            background: var(--canvas);
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 3rem;
        }

        .login-card h2 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 4px;
        }
        .login-card .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 2rem;
        }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            font-family: inherit;
            font-size: 14px;
            min-height: 40px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--surface);
            color: var(--text);
            transition:
                border-color var(--motion-fast) var(--ease-standard),
                box-shadow var(--motion-fast) var(--ease-standard);
            outline: none;
        }
        .form-group input::placeholder { color: var(--text-subtle); }
        .form-group input:hover { border-color: var(--border-strong); }
        .form-group input:focus-visible {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }

        .login-btn {
            width: 100%;
            height: 44px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition:
                background var(--motion-fast) var(--ease-standard),
                transform var(--motion-fast) var(--ease-standard);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-btn:hover { background: var(--primary-hover); }
        .login-btn:active { transform: translateY(1px); }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-error {
            background: var(--danger-soft);
            color: var(--danger);
            border: 1px solid var(--danger);
            border-radius: var(--radius-md);
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 1rem;
            display: none;
        }
        .login-error.show { display: block; }

        .spinner-sm {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        /* Responsive: stack on small screens */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            .login-brand {
                width: 100%;
                padding: 2rem;
                min-height: 200px;
            }
            .login-brand .mark-svg { width: 64px; height: 64px; margin-bottom: 1rem; }
            .login-brand h1 { font-size: 22px; }
            .login-card { padding: 2rem; }
        }
    </style>
</head>

<body>
    <!-- Left: Branding Panel -->
    <div class="login-brand">
        <div class="logo-container">
            <!-- White "I" letterform on transparent bg — sits crisply on the gradient panel -->
            <svg class="mark-svg" viewBox="0 0 64 64" role="img" aria-label="Invenio">
                <path d="M8 8H56V20H39V44H56V56H8V44H25V20H8Z"/>
            </svg>
            <h1>MSR Dashboard</h1>
            <div class="tagline">Powered by Invenio Tech</div>
        </div>
    </div>

    <!-- Right: Login Form -->
    <div class="login-form-panel">
        <div class="login-card">
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to your MSR Dashboard</p>

            <div id="login-error" class="login-error"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@company.com" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="login-btn" id="login-btn">
                    <span id="login-text">Sign In</span>
                    <span id="login-spinner" style="display:none;"><span class="spinner-sm"></span></span>
                </button>
            </form>
        </div>
    </div>

    <script>document.documentElement.classList.add('auth-ready');</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="js/utils/supabase-client.js"></script>
    <script>
        // If already logged in, redirect to dashboard
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = 'index.html';
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            const loginText = document.getElementById('login-text');
            const loginSpinner = document.getElementById('login-spinner');
            const btn = document.getElementById('login-btn');

            errorDiv.classList.remove('show');
            loginText.style.display = 'none';
            loginSpinner.style.display = 'inline-flex';
            btn.disabled = true;

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.add('show');
                loginText.style.display = 'inline';
                loginSpinner.style.display = 'none';
                btn.disabled = false;
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>

</html>
