<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png?v=20260424c" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=20260424c" />
    <meta name="theme-color" content="#0369a1" />

    <!-- Theme init: avoid FOUC by setting data-theme before paint -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('invenio-theme');
          if (saved === 'dark' || saved === 'light') {
            document.documentElement.setAttribute('data-theme', saved);
          }
        } catch (e) { /* localStorage blocked — fall through to OS preference */ }
      })();
    </script>
    <title>Login - Invenio Field MSR</title>

    <!-- Shared Design System -->
    <link rel="stylesheet" href="styles.css?v=20260424g">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Login-only layout — uses shared tokens from styles.css.
           styles.css forces overflow:hidden on body for the app shell;
           the login page doesn't render that shell, so we restore the
           normal page flow here. */
        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Left branding panel — Invenio gradient + mark */
        .login-brand {
            width: 45%;
            background: var(--hero-gradient);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            position: relative;
            overflow: hidden;
        }
        .login-brand::before,
        .login-brand::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
        }
        .login-brand::before {
            width: 400px; height: 400px;
            top: -100px; right: -100px;
        }
        .login-brand::after {
            width: 300px; height: 300px;
            background: rgba(255, 255, 255, 0.04);
            bottom: -80px; left: -80px;
        }
        .login-brand .logo-container {
            text-align: center;
            z-index: 1;
        }
        .login-brand .mark-svg {
            width: 96px;
            height: 96px;
            margin: 0 auto 2rem;
            display: block;
            color: #fff;
        }
        .login-brand .mark-svg path { fill: currentColor; }
        .login-brand h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        .login-brand .tagline {
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Right form panel */
        .login-form-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            background: var(--canvas);
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 3rem;
        }

        .login-card h2 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 4px;
        }
        .login-card .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 2rem;
        }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            font-family: inherit;
            font-size: 14px;
            min-height: 40px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--surface);
            color: var(--text);
            transition:
                border-color var(--motion-fast) var(--ease-standard),
                box-shadow var(--motion-fast) var(--ease-standard);
            outline: none;
        }
        .form-group input::placeholder { color: var(--text-subtle); }
        .form-group input:hover { border-color: var(--border-strong); }
        .form-group input:focus-visible {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }

        .login-btn {
            width: 100%;
            height: 44px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition:
                background var(--motion-fast) var(--ease-standard),
                transform var(--motion-fast) var(--ease-standard);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-btn:hover { background: var(--primary-hover); }
        .login-btn:active { transform: translateY(1px); }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-error {
            background: var(--danger-soft);
            color: var(--danger);
            border: 1px solid var(--danger);
            border-radius: var(--radius-md);
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 1rem;
            display: none;
        }
        .login-error.show { display: block; }
        .login-error.success {
            background: var(--success-soft);
            color: var(--success);
            border-color: var(--success);
        }

        .form-actions {
            margin-top: 1rem;
            text-align: center;
        }

        .link-button {
            background: transparent;
            border: 0;
            color: var(--primary);
            cursor: pointer;
            font: inherit;
            font-size: 13px;
            font-weight: 700;
            padding: 0;
        }

        .link-button:hover,
        .link-button:focus-visible {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .reset-form {
            display: none;
        }

        .reset-form.active {
            display: block;
        }

        .login-form.hidden {
            display: none;
        }

        .spinner-sm {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        /* Responsive: stack on small screens */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            .login-brand {
                width: 100%;
                padding: 2rem;
                min-height: 200px;
            }
            .login-brand .mark-svg { width: 64px; height: 64px; margin-bottom: 1rem; }
            .login-brand h1 { font-size: 22px; }
            .login-card { padding: 2rem; }
        }
    </style>
</head>

<body>
    <!-- Left: Branding Panel -->
    <div class="login-brand">
        <div class="logo-container">
            <!-- White "I" letterform on transparent bg — sits crisply on the gradient panel.
                 Uses the canonical InvenioStyle "I" path proportions. -->
            <svg class="mark-svg" viewBox="0 0 64 64" role="img" aria-label="Invenio">
                <path d="M21 17h22v7h-7.5v16H43v7H21v-7h7.5V24H21z"/>
            </svg>
            <h1>Invenio Field MSR</h1>
            <div class="tagline">Powered by Invenio Tech</div>
        </div>
    </div>

    <!-- Right: Login Form -->
    <div class="login-form-panel">
        <div class="login-card">
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to your Invenio Field MSR</p>

            <div id="login-error" class="login-error"></div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@company.com" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="login-btn" id="login-btn">
                    <span id="login-text">Sign In</span>
                    <span id="login-spinner" style="display:none;"><span class="spinner-sm"></span></span>
                </button>
                <div class="form-actions">
                    <button type="button" class="link-button" id="forgot-password-btn">Forgot password?</button>
                </div>
            </form>

            <form id="reset-request-form" class="reset-form">
                <div class="form-group">
                    <label for="reset-email">Email</label>
                    <input type="email" id="reset-email" placeholder="you@company.com" required>
                </div>
                <button type="submit" class="login-btn" id="reset-request-btn">
                    <span id="reset-request-text">Send Reset Link</span>
                    <span id="reset-request-spinner" style="display:none;"><span class="spinner-sm"></span></span>
                </button>
                <div class="form-actions">
                    <button type="button" class="link-button" id="back-to-login-btn">Back to sign in</button>
                </div>
            </form>

            <form id="update-password-form" class="reset-form">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" placeholder="Enter a new password" minlength="8">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm your new password" minlength="8">
                </div>
                <button type="submit" class="login-btn" id="update-password-btn">
                    <span id="update-password-text">Update Password</span>
                    <span id="update-password-spinner" style="display:none;"><span class="spinner-sm"></span></span>
                </button>
            </form>
        </div>
    </div>

    <script>document.documentElement.classList.add('auth-ready');</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=20260424f"></script>
    <script src="js/utils/supabase-client.js?v=20260424f"></script>
    <script src="js/utils/project-scope.js?v=20260428a"></script>
    <script>
        const loginForm = document.getElementById('login-form');
        const resetRequestForm = document.getElementById('reset-request-form');
        const updatePasswordForm = document.getElementById('update-password-form');
        const title = document.querySelector('.login-card h2');
        const subtitle = document.querySelector('.login-card .subtitle');
        const messageBox = document.getElementById('login-error');

        function isRecoveryUrl() {
            return window.location.hash.includes('type=recovery') || window.location.search.includes('type=recovery');
        }

        function setMessage(message, type = 'error') {
            messageBox.textContent = message;
            messageBox.classList.toggle('success', type === 'success');
            messageBox.classList.add('show');
        }

        function clearMessage() {
            messageBox.classList.remove('show', 'success');
            messageBox.textContent = '';
        }

        function showLoginForm() {
            title.textContent = 'Welcome back';
            subtitle.textContent = 'Sign in to your Invenio Field MSR';
            loginForm.classList.remove('hidden');
            resetRequestForm.classList.remove('active');
            updatePasswordForm.classList.remove('active');
            document.getElementById('password').required = true;
            document.getElementById('new-password').required = false;
            document.getElementById('confirm-password').required = false;
        }

        function showResetRequestForm() {
            clearMessage();
            title.textContent = 'Reset password';
            subtitle.textContent = 'Enter your email and we will send a reset link.';
            loginForm.classList.add('hidden');
            resetRequestForm.classList.add('active');
            updatePasswordForm.classList.remove('active');
            document.getElementById('password').required = false;
            document.getElementById('new-password').required = false;
            document.getElementById('confirm-password').required = false;
            document.getElementById('reset-email').value = document.getElementById('email').value;
            document.getElementById('reset-email').focus();
        }

        function showUpdatePasswordForm() {
            title.textContent = 'Set new password';
            subtitle.textContent = 'Choose a new password for your account.';
            loginForm.classList.add('hidden');
            resetRequestForm.classList.remove('active');
            updatePasswordForm.classList.add('active');
            document.getElementById('password').required = false;
            document.getElementById('new-password').required = true;
            document.getElementById('confirm-password').required = true;
            document.getElementById('new-password').focus();
        }

        function setButtonLoading(buttonId, textId, spinnerId, isLoading) {
            document.getElementById(buttonId).disabled = isLoading;
            document.getElementById(textId).style.display = isLoading ? 'none' : 'inline';
            document.getElementById(spinnerId).style.display = isLoading ? 'inline-flex' : 'none';
        }

        supabaseClient.auth.onAuthStateChange((event) => {
            if (event === 'PASSWORD_RECOVERY') {
                clearMessage();
                showUpdatePasswordForm();
            }
        });

        if (isRecoveryUrl()) {
            showUpdatePasswordForm();
        }

        // If already logged in, redirect to dashboard unless this is a password recovery session.
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session && !isRecoveryUrl()) {
                window.location.href = 'index.html';
            }
        });

        document.getElementById('forgot-password-btn').addEventListener('click', showResetRequestForm);
        document.getElementById('back-to-login-btn').addEventListener('click', () => {
            clearMessage();
            showLoginForm();
            document.getElementById('email').focus();
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            clearMessage();
            setButtonLoading('login-btn', 'login-text', 'login-spinner', true);

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                setMessage(error.message);
                setButtonLoading('login-btn', 'login-text', 'login-spinner', false);
            } else {
                window.location.href = 'index.html';
            }
        });

        resetRequestForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reset-email').value;
            const redirectTo = `${window.location.origin}${window.location.pathname}`;

            clearMessage();
            setButtonLoading('reset-request-btn', 'reset-request-text', 'reset-request-spinner', true);

            const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo });

            setButtonLoading('reset-request-btn', 'reset-request-text', 'reset-request-spinner', false);

            if (error) {
                setMessage(error.message);
                return;
            }

            setMessage('Password reset link sent. Check your email for the next step.', 'success');
        });

        updatePasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            clearMessage();

            if (newPassword.length < 8) {
                setMessage('Password must be at least 8 characters.');
                return;
            }

            if (newPassword !== confirmPassword) {
                setMessage('Passwords do not match.');
                return;
            }

            setButtonLoading('update-password-btn', 'update-password-text', 'update-password-spinner', true);

            const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

            setButtonLoading('update-password-btn', 'update-password-text', 'update-password-spinner', false);

            if (error) {
                setMessage(error.message);
                return;
            }

            setMessage('Password updated. Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 700);
        });
    </script>
</body>

</html>
