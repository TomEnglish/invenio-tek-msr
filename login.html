<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <title>Login - MSR Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            background: #f8fafc;
        }

        /* Left branding panel */
        .login-brand {
            width: 45%;
            background: #2B3A50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            position: relative;
            overflow: hidden;
        }
        .login-brand::before {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            top: -100px; right: -100px;
        }
        .login-brand::after {
            content: '';
            position: absolute;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: rgba(255,255,255,0.02);
            bottom: -80px; left: -80px;
        }
        .login-brand .logo-container {
            text-align: center;
            z-index: 1;
        }
        .login-brand svg {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
        }
        .login-brand h1 {
            color: white;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        .login-brand .tagline {
            color: #A69872;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Right form panel */
        .login-form-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            padding: 3rem;
        }

        .login-card h2 {
            font-size: 22px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .login-card .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: #1e293b;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #0369a1;
            box-shadow: 0 0 0 3px rgba(3,105,161,0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0369a1, #0891b2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-btn:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(3,105,161,0.3);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 1rem;
            display: none;
        }
        .login-error.show { display: block; }

        .spinner-sm {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive: stack on small screens */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .login-brand {
                width: 100%;
                padding: 2rem;
                min-height: 200px;
            }
            .login-brand svg { width: 80px; height: 80px; margin-bottom: 1rem; }
            .login-brand h1 { font-size: 22px; }
            .login-card { padding: 2rem; }
        }
    </style>
</head>

<body>
    <!-- Left: Branding Panel -->
    <div class="login-brand">
        <div class="logo-container">
            <svg viewBox="0 0 100 100">
                <polygon points="50,5 93.3,27.5 93.3,72.5 50,95 6.7,72.5 6.7,27.5" fill="#A69872" />
                <polygon points="50,30 73,44 50,68 27,44" fill="white" />
            </svg>
            <h1>MSR Dashboard</h1>
            <div class="tagline">Powered by Invenio Tech</div>
        </div>
    </div>

    <!-- Right: Login Form -->
    <div class="login-form-panel">
        <div class="login-card">
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to your MSR Dashboard</p>

            <div id="login-error" class="login-error"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@company.com" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="login-btn" id="login-btn">
                    <span id="login-text">Sign In</span>
                    <span id="login-spinner" style="display:none;"><span class="spinner-sm"></span></span>
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="js/utils/supabase-client.js"></script>
    <script>
        // If already logged in, redirect to dashboard
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = 'index.html';
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            const loginText = document.getElementById('login-text');
            const loginSpinner = document.getElementById('login-spinner');
            const btn = document.getElementById('login-btn');

            errorDiv.classList.remove('show');
            loginText.style.display = 'none';
            loginSpinner.style.display = 'inline-flex';
            btn.disabled = true;

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.add('show');
                loginText.style.display = 'inline';
                loginSpinner.style.display = 'none';
                btn.disabled = false;
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>

</html>
