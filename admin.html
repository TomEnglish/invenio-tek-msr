<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="brand/app-icon.svg" />
    <meta name="theme-color" content="#0369a1" />

    <!-- Theme init: avoid FOUC by setting data-theme before paint -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('invenio-theme');
          if (saved === 'dark' || saved === 'light') {
            document.documentElement.setAttribute('data-theme', saved);
          }
        } catch (e) { /* localStorage blocked — fall through to OS preference */ }
      })();
    </script>
    <link rel="manifest" href="site.webmanifest" />
    <title>Data Browser - MSR Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Shared Design System -->
    <link rel="stylesheet" href="styles.css?v=20260424b">

    <style>html:not(.auth-ready) body { visibility: hidden; }</style>

    <style>
        /* Admin Data Browser — page-specific styles */
        .toolbar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: end;
            flex-wrap: wrap;
        }

        .toolbar label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
            display: block;
        }

        .data-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .data-card .card-header {
            padding: 1rem 1.5rem;
            border-bottom: 2px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
        }

        .data-card .card-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .data-table thead {
            background: var(--text-primary);
            color: white;
        }

        .data-table thead th {
            padding: 0.75rem 1rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }

        .data-table thead th:hover {
            background: #2a2a2a;
        }

        .data-table thead th .sort-icon {
            margin-left: 4px;
            opacity: 0.5;
        }

        .data-table thead th.sorted .sort-icon {
            opacity: 1;
        }

        .data-table tbody tr {
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }

        .data-table tbody tr:hover {
            background: var(--border-light);
        }

        .data-table tbody td {
            padding: 0.6rem 1rem;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .pagination-bar {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .pagination-bar .page-btns {
            display: flex;
            gap: 4px;
        }

        .pagination-bar button {
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 6px;
            padding: 0.35rem 0.75rem;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .pagination-bar button:hover { background: var(--border-light); }
        .pagination-bar button:disabled { opacity: 0.4; cursor: default; }
        .pagination-bar button.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Edit modal */
        .edit-modal .modal-content {
            border-radius: 12px;
            border: none;
        }

        .edit-modal .modal-header {
            border-bottom: 2px solid var(--primary);
            padding: 1rem 1.5rem;
        }

        .edit-modal .modal-body {
            padding: 1.5rem;
            max-height: 70vh;
            overflow-y: auto;
        }

        .edit-modal .field-group {
            margin-bottom: 1rem;
        }

        .edit-modal .field-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .edit-modal .field-group label .badge {
            font-size: 0.65rem;
            font-weight: 500;
        }

        .edit-modal .field-readonly {
            background: var(--border-light);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            word-break: break-all;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        .record-count {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .toolbar { flex-direction: column; }
            .data-table { font-size: 0.8rem; }
            .data-table tbody td { padding: 0.5rem 0.6rem; }
        }
    </style>
</head>

<body>
    <!-- Toolbar -->
    <div class="toolbar">
        <div>
            <label for="tableSelect">Table</label>
            <select class="form-select" id="tableSelect" style="min-width: 220px;"></select>
        </div>
        <div class="flex-grow-1">
            <label for="searchInput">Search</label>
            <input type="text" class="form-control" id="searchInput" placeholder="Search across columns...">
        </div>
        <div>
            <label for="pageSizeSelect">Rows</label>
            <select class="form-select" id="pageSizeSelect">
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-primary btn-sm" id="btnRefresh" title="Refresh">
                <i class="fas fa-sync-alt"></i>
            </button>
            <button class="btn btn-outline-secondary btn-sm" id="btnExportCSV" title="Export CSV">
                <i class="fas fa-download"></i> CSV
            </button>
            <button class="btn btn-primary btn-sm" id="btnAddRecord" style="display: none;" title="Add Record">
                <i class="fas fa-plus"></i> Add
            </button>
        </div>
    </div>

    <!-- Data Table -->
    <div class="data-card">
        <div class="card-header">
            <h3 id="tableTitle"><i class="fas fa-table me-2"></i>Select a table</h3>
            <span class="record-count" id="recordCount"></span>
        </div>
        <div class="table-responsive">
            <table class="data-table" id="dataTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="20" class="empty-state">
                            <i class="fas fa-database d-block"></i>
                            <p>Select a table from the dropdown above</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="pagination-bar" id="paginationBar" style="display: none;">
            <span id="pageInfo">Page 1</span>
            <div class="page-btns">
                <button id="btnPrevPage" disabled><i class="fas fa-chevron-left"></i></button>
                <button id="btnNextPage" disabled><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade edit-modal" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalTitle">Edit Record</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="editModalBody"></div>
                <div class="modal-footer">
                    <button class="btn btn-danger me-auto" id="btnDeleteRecord" style="display: none;">
                        <i class="fas fa-trash me-1"></i> Delete
                    </button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" id="btnSaveRecord">
                        <i class="fas fa-save me-1"></i> Save Changes
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Supabase Configuration -->
    <script src="supabase-config.js"></script>

    <!-- Shared Utilities -->
    <script src="js/utils/constants.js"></script>
    <script src="js/utils/formatting.js"></script>
    <script src="js/utils/branding.js"></script>
    <script src="js/utils/supabase-client.js"></script>
    <script src="js/utils/auth-guard.js"></script>
    <script src="js/utils/sidebar.js"></script>

    <!-- Admin Data Browser JS -->
    <script src="admin.js"></script>
</body>

</html>
