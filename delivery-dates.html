<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png?v=20260424c" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=20260424c" />
    <meta name="theme-color" content="#0369a1" />

    <!-- Theme init: avoid FOUC by setting data-theme before paint -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('invenio-theme');
          if (saved === 'dark' || saved === 'light') {
            document.documentElement.setAttribute('data-theme', saved);
          }
        } catch (e) { /* localStorage blocked — fall through to OS preference */ }
      })();
    </script>
    <link rel="manifest" href="site.webmanifest" />
    <title>Delivery Dates - MSR Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Shared Design System -->
    <link rel="stylesheet" href="styles.css?v=20260424e">

    <style>
        /* Page-specific styles */
        .filter-section {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 14px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        .filter-section .form-control,
        .filter-section .form-select {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-size: 13px;
        }

        .filter-section .form-control:focus,
        .filter-section .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(3, 105, 161, 0.15);
        }

        .view-toggle {
            display: flex;
            gap: 0.5rem;
        }

        .view-toggle .btn {
            padding: 0.5rem 1rem;
        }

        .view-toggle .btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Calendar View */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .calendar-day {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            min-height: 120px;
        }

        .calendar-day-header {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .calendar-delivery {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            margin-bottom: 0.25rem;
            border-radius: 8px;
            background-color: var(--border-light);
        }

        /* Badges */
        .badge-upcoming {
            background-color: var(--info-blue);
            color: white;
        }

        .badge-soon {
            background-color: var(--warning);
            color: white;
            font-weight: 600;
        }

        .badge-overdue {
            background-color: var(--danger);
            color: white;
        }

        .badge-ready {
            background-color: var(--success);
            color: white;
        }

        .badge-delivered {
            background-color: var(--success);
            color: white;
        }
    </style>
    <style>html:not(.auth-ready) body { visibility: hidden; }</style>
</head>

<body>
    <!-- KPI Cards -->
    <div class="kpi-grid">
        <div class="kpi-card">
            <div>
                <div class="kpi-label">Total Deliveries</div>
                <div class="kpi-value" id="totalDeliveries">0</div>
            </div>
            <div class="kpi-icon blue"><i class="fas fa-boxes"></i></div>
        </div>
        <div class="kpi-card">
            <div>
                <div class="kpi-label">Ready Next 30 Days</div>
                <div class="kpi-value" id="upcomingDeliveries">0</div>
            </div>
            <div class="kpi-icon teal"><i class="far fa-clock"></i></div>
        </div>
        <div class="kpi-card">
            <div>
                <div class="kpi-label">Ready This Week</div>
                <div class="kpi-value" id="weekDeliveries">0</div>
            </div>
            <div class="kpi-icon amber"><i class="fas fa-exclamation-triangle"></i></div>
        </div>
        <div class="kpi-card">
            <div>
                <div class="kpi-label">Ready Now</div>
                <div class="kpi-value" id="overdueDeliveries">0</div>
            </div>
            <div class="kpi-icon green"><i class="fas fa-times-circle"></i></div>
        </div>
    </div>

    <!-- Filters -->
    <div class="filter-section">
        <div class="row g-3">
            <div class="col-md-3">
                <input type="text" class="form-control" id="searchInput"
                    placeholder="Search PO, Package, Supplier...">
            </div>
            <div class="col-md-2">
                <select class="form-select" id="filterStatus">
                    <option value="">All Status</option>
                    <option value="ready">Ready Now</option>
                    <option value="week">Ready This Week</option>
                    <option value="upcoming">Not Ready Yet</option>
                    <option value="tbd">TBD (No Date)</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="filterSupplier">
                    <option value="">All Suppliers</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="filterPhase">
                    <option value="">All Phases</option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="filterTimeframe">
                    <option value="all">All Timeframes</option>
                    <option value="ready">Ready Now (Past RTS Date)</option>
                    <option value="week">Ready This Week (7 days)</option>
                    <option value="month">Ready This Month (30 days)</option>
                    <option value="upcoming">Ready Next 30 Days</option>
                </select>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-md-12">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="view-toggle">
                        <button class="btn btn-outline-secondary active" id="btnListView">
                            <i class="fas fa-list me-1"></i> List View
                        </button>
                        <button class="btn btn-outline-secondary" id="btnCalendarView">
                            <i class="far fa-calendar me-1"></i> Calendar View
                        </button>
                    </div>
                    <button class="btn btn-primary" id="btnExport">
                        <i class="fas fa-download me-1"></i> Export to Excel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- List View -->
    <div id="listView">
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-list me-2"></i> Ready to Ship Schedule (<span id="resultCount">0</span> items)
                </h5>
            </div>
            <div class="card-body p-0">
                <div class="table-container">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Ready to Ship Date</th>
                                <th>Status</th>
                                <th>PO Number</th>
                                <th>Package Description</th>
                                <th>Tag Number</th>
                                <th>Supplier</th>
                                <th>Phase</th>
                                <th>Date Range / Notes</th>
                            </tr>
                        </thead>
                        <tbody id="deliveryTableBody">
                            <tr>
                                <td colspan="8" class="text-center py-5">
                                    <span class="loading-spinner"></span>
                                    <p class="mt-2" style="color: var(--text-muted);">Loading delivery dates...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Calendar View (hidden by default) -->
    <div id="calendarView" style="display: none;">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center">
                    <h5><i class="far fa-calendar me-2"></i> Calendar View</h5>
                    <div>
                        <button class="btn btn-sm btn-outline-secondary" id="btnPrevMonth">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span class="mx-3" id="calendarMonth"></span>
                        <button class="btn btn-sm btn-outline-secondary" id="btnNextMonth">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="calendar-grid" id="calendarGrid">
                    <!-- Calendar will be populated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=20260424e"></script>

    <!-- Shared Utilities -->
    <script src="js/utils/constants.js?v=20260424e"></script>
    <script src="js/utils/formatting.js?v=20260424e"></script>
    <script src="js/utils/branding.js?v=20260424e"></script>
    <script src="js/utils/supabase-client.js?v=20260424e"></script>
    <script src="js/utils/auth-guard.js?v=20260424e"></script>
    <script src="js/utils/export.js?v=20260424e"></script>
    <script src="js/utils/sidebar.js?v=20260424e"></script>

    <!-- Delivery Dates JavaScript -->
    <script src="delivery-dates.js?v=20260424e"></script>
</body>

</html>
