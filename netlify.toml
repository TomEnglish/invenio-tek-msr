# Netlify Configuration for Invenio Field MSR
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # No build command needed - this is a static site
  publish = "."

  # Ignore Python files and backend scripts
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF"

# Redirect rules (optional - for clean URLs)
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Environment variables for Supabase
# Note: These are PUBLIC and safe to expose in client-side code
# Set these in Netlify UI: Site settings > Environment variables
[build.environment]
  # SUPABASE_URL will be injected via netlify UI or build script
  # SUPABASE_ANON_KEY will be injected via netlify UI or build script

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets — short max-age + must-revalidate so deploys take effect
# without a hard-refresh. Don't use `immutable` on un-fingerprinted file names
# like styles.css or *.js: the browser will hold the stale copy for the full
# max-age and never check for updates.
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Brand SVGs and favicon — content-stable, can cache longer but still revalidate.
[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# PNG icons — short cache + must-revalidate so icon swaps go through immediately.
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
